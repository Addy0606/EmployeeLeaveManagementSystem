@if (report) {
<app-manager-navbar></app-manager-navbar>
<div class="container mt-5">

    <h2 class="mb-4">Manager Dashboard</h2>

    <div class="row">

        <div class="col-md-3">

            <div class="card text-center shadow">

                <div class="card-body">

                    <h5>Total Requests</h5>

                    <h2>{{ report.totalRequests }}</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-center shadow">

                <div class="card-body">

                    <h5>Pending</h5>

                    <h2>{{ report.pending }}</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-center shadow">

                <div class="card-body">

                    <h5>Approved</h5>

                    <h2>{{ report.approved }}</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-center shadow">

                <div class="card-body">

                    <h5>Rejected</h5>

                    <h2>{{ report.rejected }}</h2>

                </div>

            </div>

        </div>

    </div>

    <div class="mt-4">

        <a
            routerLink="/pending-requests"
            class="btn btn-primary">

            View Pending Requests

        </a>

    </div>

</div>

}
