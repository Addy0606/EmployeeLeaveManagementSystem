<app-employee-navbar></app-employee-navbar>
<div class="container mt-5">
        
        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h3>Apply Leave</h3>

            </div>

            <div class="card-body">

                <div class="mb-3">

                    <label class="form-label">Leave Type</label>

                    <select
                        class="form-select"
                        [(ngModel)]="leaveRequest.leaveTypeId">

                        <option [value]="1">Casual Leave</option>
                        <option [value]="2">Sick Leave</option>
                        <option [value]="3">Earned Leave</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Start Date

                    </label>

                    <input
                        type="date"
                        class="form-control"
                        [(ngModel)]="leaveRequest.startDate">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        End Date

                    </label>

                    <input
                        type="date"
                        class="form-control"
                        [(ngModel)]="leaveRequest.endDate">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Reason

                    </label>

                    <textarea
                        rows="4"
                        class="form-control"
                        [(ngModel)]="leaveRequest.reason">

                    </textarea>

                </div>

                <button
                    class="btn btn-success"
                    (click)="applyLeave()">

                    Apply Leave

                </button>

            </div>

        </div>

    </div>
